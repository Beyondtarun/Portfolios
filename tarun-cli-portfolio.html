<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0d0d;
  --bg2:#111;
  --green:#00ff41;
  --green2:#00cc33;
  --green-dim:#00ff4133;
  --cyan:#00d4ff;
  --yellow:#ffdd00;
  --red:#ff4444;
  --white:#e0e0e0;
  --grey:#666;
  --grey2:#333;
  --font:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--green);font-family:var(--font);overflow:hidden;}

/* CRT effect */
/*body::before{
  content:"";position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.15) 0px,rgba(0,0,0,.15) 1px,transparent 1px,transparent 2px);
}*/
body::after{
  content:"";position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.7) 100%);
}

/* Terminal window */
#terminal{
  width:100%;height:100vh;
  display:flex;flex-direction:column;
  position:relative;
}

/* Title bar */
.title-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem 1rem;
  background:#1a1a1a;
  border-bottom:1px solid #222;
  flex-shrink:0;
}
.title-bar-dots{display:flex;gap:.5rem;}
.dot{width:12px;height:12px;border-radius:50%;}
.dot.red{background:#ff5f57;}
.dot.yellow{background:#febc2e;}
.dot.green{background:#28c840;}
.title-bar-title{
  font-size:.75rem;color:#666;letter-spacing:.1em;
  position:absolute;left:50%;transform:translateX(-50%);
}
.title-bar-info{font-size:.7rem;color:#444;}

/* Output area */
#output{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:1rem 1.5rem;
  line-height:1.7;
  font-size:.85rem;
}
#output::-webkit-scrollbar{width:4px;}
#output::-webkit-scrollbar-track{background:transparent;}
#output::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}

/* Input line */
.input-area{
  display:flex;align-items:center;
  padding:.6rem 1.5rem;
  border-top:1px solid #1a1a1a;
  background:#0d0d0d;
  flex-shrink:0;
  gap:.5rem;
}
.prompt-label{color:var(--green);font-size:.85rem;white-space:nowrap;user-select:none;}
.prompt-label .user{color:var(--cyan);}
.prompt-label .at{color:var(--grey);}
.prompt-label .host{color:var(--green);}
.prompt-label .sep{color:var(--grey);}
.prompt-label .path{color:var(--yellow);}
#input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--white);font-family:var(--font);font-size:.85rem;
  caret-color:var(--green);
}

/* Output line types */
.line{display:block;margin-bottom:.1rem;word-break:break-word;}
.line.cmd{color:var(--white);}
.line.cmd .prompt{color:var(--green);margin-right:.5rem;user-select:none;}
.line.cmd .prompt .u{color:var(--cyan);}
.line.cmd .prompt .h{color:var(--green);}
.line.cmd .prompt .p{color:var(--yellow);}
.line.out{color:var(--white);}
.line.green{color:var(--green);}
.line.cyan{color:var(--cyan);}
.line.yellow{color:var(--yellow);}
.line.red{color:var(--red);}
.line.grey{color:var(--grey);}
.line.blank{height:.4rem;}
.line.ascii{color:var(--green);font-size:.72rem;line-height:1.3;white-space:pre;}
.line.section{color:var(--cyan);letter-spacing:.15em;}
.line.key{color:var(--yellow);}

/* Highlight spans */
.hl-green{color:var(--green);}
.hl-cyan{color:var(--cyan);}
.hl-yellow{color:var(--yellow);}
.hl-red{color:var(--red);}
.hl-white{color:var(--white);}
.hl-grey{color:var(--grey);}

/* Typing cursor */
.cursor{display:inline-block;width:8px;height:1em;background:var(--green);vertical-align:text-bottom;animation:blink .7s step-end infinite;margin-left:1px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* Progress bar */
.progress-bar{display:inline-block;color:var(--green);}
.progress-track{color:var(--grey2);}

/* Table */
.cli-table{border-collapse:collapse;width:100%;margin:.3rem 0;}
.cli-table td{padding:.15rem 1rem .15rem 0;font-size:.82rem;vertical-align:top;}
.cli-table td:first-child{color:var(--yellow);white-space:nowrap;min-width:140px;}
.cli-table td:last-child{color:var(--white);}

/* Tag chips */
.tag{display:inline-block;border:1px solid var(--green2);color:var(--green);padding:.05rem .4rem;font-size:.7rem;margin:.1rem .2rem .1rem 0;}
.tag.cyan{border-color:var(--cyan);color:var(--cyan);}
.tag.yellow{border-color:var(--yellow);color:var(--yellow);}

/* Autocomplete hint */
.hint{color:#333;font-style:italic;}

/* Help command grid */
.cmd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.3rem;margin:.3rem 0;}
.cmd-item{display:flex;gap:.6rem;}
.cmd-item .cmd-name{color:var(--green);min-width:100px;}
.cmd-item .cmd-desc{color:var(--grey);font-size:.78rem;}

/* Mobile */
@media(max-width:600px){
  #output{font-size:.78rem;padding:.8rem 1rem;}
  .input-area{padding:.5rem 1rem;}
  #input{font-size:.78rem;}
  .title-bar-title{display:none;}
  .cli-table td:first-child{min-width:110px;}
  .line.ascii{font-size:.55rem;}
}
</style>
</head>

function line(text="", cls="out"){

  el.innerHTML = text;
  out.appendChild(el);
  out.scrollTop = out.scrollHeight;
}
function blank(){ line("","blank"); }

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function tag(t,cls=""){ return `<span class="tag ${cls}">${esc(t)}</span>`; }
function hl(t,c="green"){ return `<span class="hl-${c}">${t}</span>`; }

// Typewriter for a single line
function typewriterLine(text, cls, speed, callback){
  const el = document.createElement("span");
  el.className = "line " + cls;
  out.appendChild(el);
  let i = 0;
  // Strip HTML for typing (render raw)
  const stripped = text.replace(/<[^>]+>/g,"");
  function tick(){
    if(i <= stripped.length){
      el.textContent = stripped.slice(0,i);
      i++;
      out.scrollTop = out.scrollHeight;
      setTimeout(tick, speed);
    } else {
      el.innerHTML = text; // swap in real HTML at end
      if(callback) callback();
    }
  }
  tick();
}

// ── COMMAND RUNNER ──
function run(raw){
  const trimmed = raw.trim();
  if(!trimmed) return;

  history.unshift(trimmed);
  histIdx = -1;

  printCmd(trimmed);

  const [cmd, ...argParts] = trimmed.split(" ");
  const args = argParts.join(" ").trim();
  const fn = COMMANDS[cmd.toLowerCase()];

  if(fn) fn(args || null);
  else{
    line(`${hl("bash:","red")} command not found: ${hl(esc(cmd),"white")} — type ${hl("help","cyan")} for commands`);
  }
  blank();
  out.scrollTop = out.scrollHeight;
}

// ── INPUT HANDLER ──
inp.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    const val = inp.value;
    inp.value = "";
    run(val);
  }
  else if(e.key === "ArrowUp"){
    e.preventDefault();
    if(histIdx < history.length-1){ histIdx++; inp.value = history[histIdx]; }
  }
  else if(e.key === "ArrowDown"){
    e.preventDefault();
    if(histIdx > 0){ histIdx--; inp.value = history[histIdx]; }
    else { histIdx = -1; inp.value = ""; }
  }
  else if(e.key === "Tab"){
    e.preventDefault();
    const val = inp.value.trim().toLowerCase();
    if(!val) return;
    const match = Object.keys(COMMANDS).find(c=>c.startsWith(val));
    if(match) inp.value = match;
  }
  else if(e.key === "l" && e.ctrlKey){
    e.preventDefault();
    cmdClear();
  }
});

// Always focus input on click anywhere
document.addEventListener("click", ()=> inp.focus());
document.addEventListener("touchend", ()=> inp.focus());
